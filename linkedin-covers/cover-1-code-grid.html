<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Cover — Code Grid</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #1a1a2e;
  }

  .cover {
    width: 1584px;
    height: 396px;
    background: #0a0f14;
    position: relative;
    overflow: hidden;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }

  /* Subtle dot grid */
  .cover::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 32px 32px;
    z-index: 1;
  }

  /* Blue-purple ambient glow — behind text */
  .glow-1 {
    position: absolute;
    width: 600px;
    height: 600px;
    top: -200px;
    left: 400px;
    background: radial-gradient(circle, rgba(96,165,250,0.08) 0%, transparent 70%);
    z-index: 1;
  }

  /* Purple glow — behind J */
  .glow-2 {
    position: absolute;
    width: 600px;
    height: 600px;
    top: -150px;
    right: -100px;
    background: radial-gradient(circle, rgba(167,139,250,0.07) 0%, transparent 70%);
    z-index: 1;
  }

  /* ═══ LEFT CONTENT ═══ */
  .left-content {
    position: absolute;
    z-index: 10;
    left: 500px;
    top: 50%;
    transform: translateY(-55%);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .name {
    font-family: 'Instrument Serif', serif;
    font-size: 72px;
    font-weight: 400;
    color: #f1f5f9;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .name em {
    font-style: italic;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-size: 19px;
    font-weight: 500;
    color: #94a3b8;
    letter-spacing: 0.01em;
  }

  .pills {
    display: flex;
    gap: 10px;
    margin-top: 2px;
  }

  .pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: #94a3b8;
    padding: 6px 14px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    background: rgba(255,255,255,0.03);
  }

  .pill.accent {
    border-color: rgba(96,165,250,0.25);
    color: #60a5fa;
    background: rgba(96,165,250,0.06);
  }

  /* ═══ J LOGO — original image, no filters ═══ */
  .j-logo {
    position: absolute;
    z-index: 10;
    right: 50px;
    top: 50%;
    transform: translateY(-50%);
    width: 230px;
    height: 230px;
  }

  .j-logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 46px;
  }

  /* Rounded-square rings behind J (matching the logo border-radius) */
  .j-ring {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    border: 1px solid rgba(255,255,255,0.04);
    z-index: 5;
    /* Rounded square, not circle */
    border-radius: 56px;
  }

  .j-ring-1 {
    width: 270px;
    height: 270px;
    right: 30px;
  }

  .j-ring-2 {
    width: 310px;
    height: 310px;
    right: 10px;
    border-color: rgba(255,255,255,0.02);
  }

  /* ═══ CODE SNIPPETS — pushed further right ═══ */
  .code-float {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.7;
    white-space: pre;
    z-index: 3;
    pointer-events: none;
  }

  /* Left of J */
  .code-1 {
    top: 36px;
    right: 340px;
    color: rgba(96,165,250,0.35);
  }

  .code-2 {
    bottom: 44px;
    right: 320px;
    color: rgba(167,139,250,0.30);
  }

  /* Right of J — pushed further out */
  .code-3 {
    top: 36px;
    right: -90px;
    color: rgba(148,163,184,0.22);
  }

  .code-4 {
    bottom: 36px;
    right: -70px;
    color: rgba(96,165,250,0.18);
  }

  /* ═══ BOTTOM ═══ */
  .accent-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #3b82f6 30%, #8b5cf6 70%, transparent);
    opacity: 0.6;
    z-index: 10;
  }

  .url {
    position: absolute;
    bottom: 26px;
    left: 500px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: #64748b;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .url-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #3b82f6;
    animation: pulseDot 2s infinite;
  }

  @keyframes pulseDot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
</style>
</head>
<body>
  <div class="cover">
    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <!-- Code snippets -->
    <div class="code-float code-1">const build = () => {
  return create({
    design: true,
    code: true
  });
};</div>
    <div class="code-float code-2">// ship it
export default
  Portfolio;</div>
    <div class="code-float code-3">&lt;Component
  variant="bold"
  theme="dark"
/&gt;</div>
    <div class="code-float code-4">git push origin
  main --force</div>

    <!-- Left text -->
    <div class="left-content">
      <div class="name">João <em>Graça</em></div>
      <div class="tagline">Full-Stack Developer & Designer</div>
      <div class="pills">
        <span class="pill accent">React</span>
        <span class="pill">Node.js</span>
        <span class="pill">UI/UX</span>
      </div>
    </div>

    <!-- J logo with rounded-square rings -->
    <div class="j-ring j-ring-1"></div>
    <div class="j-ring j-ring-2"></div>
    <div class="j-logo">
      <img src="../public/favicon-512x512.png" alt="J" />
    </div>

    <div class="url"><span class="url-dot"></span> joaograca.work</div>
    <div class="accent-line"></div>
  </div>
</body>
</html>
